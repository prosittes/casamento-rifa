<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Painel Administrativo — Bruna & Jonatas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ---- RESET & BASE ---- */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --branco: #FFFFFF;
      --branco-suave: #FAFAF8;
      --madeira: #C4A882;
      --madeira-escura: #8B7355;
      --madeira-clara: #E8DCC8;
      --cinza-inox: #6B7280;
      --cinza-claro: #9CA3AF;
      --cinza-fundo: #F3F4F6;
      --preto: #1C1917;
      --preto-suave: #292524;
      --verde: #10B981;
      --vermelho: #EF4444;
      --azul: #3B82F6;
      --sombra: 0 4px 24px rgba(28,25,23,0.08);
      --raio: 16px;
      --raio-sm: 12px;
      --transicao: all 0.3s cubic-bezier(0.4,0,0.2,1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--branco-suave);
      color: var(--preto);
      min-height: 100vh;
      line-height: 1.6;
    }

    h1, h2, h3 { font-family: 'Playfair Display', serif; font-weight: 600; }

    /* ---- HEADER ---- */
    .header {
      background: var(--preto);
      color: var(--branco);
      padding: 1.5rem 1.2rem;
      text-align: center;
    }
    .header h1 { font-size: 1.6rem; margin-bottom: 0.3rem; }
    .header p { font-size: 0.85rem; color: var(--cinza-claro); }

    /* ---- CONTAINER ---- */
    .container {
      width: 100%;
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.2rem;
    }

    /* ---- CARDS ---- */
    .card {
      background: var(--branco);
      border: 1px solid var(--madeira-clara);
      border-radius: var(--raio);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--sombra);
    }

    .card h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      color: var(--preto);
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* ---- FORMULÁRIO ---- */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1rem;
    }

    @media (min-width: 640px) {
      .form-grid { grid-template-columns: 2fr 1fr auto; align-items: end; }
    }

    .campo { display: flex; flex-direction: column; gap: 0.3rem; }
    .campo label { font-size: 0.85rem; font-weight: 500; color: var(--cinza-inox); }

    input, select {
      padding: 0.8rem 1rem;
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
      color: var(--preto);
      background: var(--branco);
      border: 2px solid var(--madeira-clara);
      border-radius: var(--raio-sm);
      outline: none;
      transition: var(--transicao);
      width: 100%;
    }

    input:focus, select:focus {
      border-color: var(--madeira);
      box-shadow: 0 0 0 3px rgba(196,168,130,0.15);
    }

    /* ---- BOTÕES ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.4rem;
      padding: 0.8rem 1.5rem;
      font-family: 'Inter', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--branco);
      background: var(--preto);
      border: none;
      border-radius: var(--raio-sm);
      cursor: pointer;
      transition: var(--transicao);
      box-shadow: var(--sombra);
      white-space: nowrap;
    }

    .btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(28,25,23,0.12); }
    .btn-verde { background: var(--verde); }
    .btn-verde:hover { background: #059669; }
    .btn-vermelho { background: var(--vermelho); }
    .btn-vermelho:hover { background: #DC2626; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none !important; }

    /* ---- TABELA ---- */
    .tabela-wrapper { overflow-x: auto; margin-top: 1rem; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    th, td {
      padding: 0.8rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--madeira-clara);
    }

    th {
      background: var(--cinza-fundo);
      font-weight: 600;
      color: var(--preto);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    td { color: var(--cinza-inox); }

    tr:hover td { background: var(--branco-suave); }

    .tag-status {
      display: inline-flex;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 600;
    }

    .tag-disponivel { background: rgba(16,185,129,0.1); color: var(--verde); }
    .tag-reservado { background: rgba(239,68,68,0.1); color: var(--vermelho); }

    .btn-pequeno {
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
    }

    /* ---- LISTAS DE PRESENÇA ---- */
    .presenca-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
    }

    @media (min-width: 768px) {
      .presenca-grid { grid-template-columns: 1fr 1fr; }
    }

    .lista-presenca { margin-top: 0.5rem; }

    .item-presenca {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem;
      background: var(--branco-suave);
      border-radius: 8px;
      margin-bottom: 0.4rem;
      font-size: 0.9rem;
    }

    .item-presenca .nome { font-weight: 500; color: var(--preto); }
    .item-presenca .status-sim { color: var(--verde); font-weight: 600; }
    .item-presenca .status-nao { color: var(--vermelho); font-weight: 600; }

    .contador {
      font-size: 0.8rem;
      color: var(--cinza-claro);
      margin-top: 0.5rem;
    }

    .vazio {
      text-align: center;
      color: var(--cinza-claro);
      padding: 1.5rem;
      font-size: 0.9rem;
    }

    /* ---- TOAST ---- */
    .toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--preto);
      color: var(--branco);
      padding: 1rem 1.8rem;
      border-radius: var(--raio-sm);
      font-size: 0.95rem;
      font-weight: 500;
      box-shadow: var(--sombra);
      z-index: 2000;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.4,0,0.2,1);
      text-align: center;
      max-width: 90vw;
    }

    .toast.visivel { opacity: 1; transform: translateX(-50%) translateY(0); }
    .toast.sucesso { background: var(--verde); }
    .toast.erro { background: var(--vermelho); }

    /* ---- SPINNER ---- */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: var(--branco);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ---- DECOR LINE ---- */
    .decor-line {
      width: 40px; height: 2px;
      background: var(--madeira);
      margin: 1rem auto;
      border-radius: 2px;
    }
  </style>
<base target="_blank">
</head>
<body>

  <!-- ==================== HEADER ==================== -->
  <header class="header">
    <h1>🤍 Painel Administrativo</h1>
    <p>Chá Bar & Chá de Casa Nova — Bruna & Jonatas</p>
  </header>

  <div class="container">

    <!-- ==================== CADASTRO DE PRESENTES ==================== -->
    <div class="card">
      <h2>🎁 Cadastrar Novo Presente</h2>
      <div class="form-grid">
        <div class="campo">
          <label for="input-nome-presente">Nome do Presente</label>
          <input type="text" id="input-nome-presente" placeholder="Ex: Jogo de Panelas Tramontina" maxlength="100">
        </div>
        <div class="campo">
          <label for="select-categoria">Categoria</label>
          <select id="select-categoria">
            <option value="🍳 Cozinha / Utilidades">🍳 Cozinha / Utilidades</option>
            <option value="🍸 Bar">🍸 Bar</option>
            <option value="🛏️ Cama e Banho">🛏️ Cama e Banho</option>
            <option value="🧹 Limpeza">🧹 Limpeza</option>
            <option value="🏠 Casa">🏠 Casa</option>
          </select>
        </div>
        <button id="btn-cadastrar" class="btn btn-verde">
          <span>+</span> Cadastrar
        </button>
      </div>
    </div>

    <!-- ==================== LISTA DE PRESENTES ==================== -->
    <div class="card">
      <h2>📋 Presentes Cadastrados</h2>
      <div class="tabela-wrapper">
        <table>
          <thead>
            <tr>
              <th>Nome</th>
              <th>Categoria</th>
              <th>Status</th>
              <th>Padrinho</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="tabela-presentes">
            <!-- Preenchido via JS -->
          </tbody>
        </table>
      </div>
    </div>

    <!-- ==================== LISTAS DE PRESENÇA ==================== -->
    <div class="card">
      <h2>📝 Confirmações de Presença</h2>
      <div class="presenca-grid">
        <div>
          <h3 style="font-size:1.1rem; color:var(--madeira-escura); margin-bottom:0.5rem;">📍 Andrelândia — MG</h3>
          <div class="decor-line" style="margin:0.5rem 0 1rem;"></div>
          <div id="lista-andrelandia" class="lista-presenca">
            <div class="vazio">Carregando...</div>
          </div>
          <div id="contador-andrelandia" class="contador"></div>
        </div>
        <div>
          <h3 style="font-size:1.1rem; color:var(--madeira-escura); margin-bottom:0.5rem;">📍 São José dos Campos — SP</h3>
          <div class="decor-line" style="margin:0.5rem 0 1rem;"></div>
          <div id="lista-sjc" class="lista-presenca">
            <div class="vazio">Carregando...</div>
          </div>
          <div id="contador-sjc" class="contador"></div>
        </div>
      </div>
    </div>

  </div>

  <!-- ==================== TOAST ==================== -->
  <div id="toast" class="toast"></div>

  <!-- ==================== FIREBASE SDK v10 (Módulos) ==================== -->
  <script type="module" src="admin.js"></script>
</body>
</html>
